<!DOCTYPE html>
<html>
<head>
    <title>Tournament Registration</title>
</head>

<body>

    <!-- Page title -->
    <h1>Valorant Tournament Registration</h1>

    <!-- Navigation menu -->
    <nav>
        <a href="index.html">Home</a> |
        <a href="register.html">Tournament Registration</a> |
        <a href="agents.html">Agents Gallery</a>
    </nav>

    <hr>

    <!-- Form section starts here -->
    <h2>Join Our Next Tournament</h2>

    <form>

        <!-- Text input for name -->
        <label>Full Name:</label><br>
        <input type="text"><br><br>

        <!-- Email input -->
        <label>Email Address:</label><br>
        <input type="email"><br><br>

        <!-- Number input for age -->
        <label>Age:</label><br>
        <input type="number"><br><br>

        <!-- Date input -->
        <label>Date of Registration:</label><br>
        <input type="date"><br><br>

        <!-- Dropdown selection -->
        <label>Select Your Main Agent:</label><br>
        <select>
            <option>Jett</option>
            <option>Phoenix</option>
            <option>Sage</option>
            <option>Reyna</option>
        </select>

        <br><br>

        <!-- Radio buttons (only one choice allowed) -->
        <label>Preferred Role:</label><br>
        <input type="radio" name="role"> Duelist
        <input type="radio" name="role"> Controller
        <input type="radio" name="role"> Sentinel

        <br><br>

        <!-- Checkboxes (multiple choices allowed) -->
        <label>Game Modes Played:</label><br>
        <input type="checkbox"> Competitive <br>
        <input type="checkbox"> Unrated <br>
        <input type="checkbox"> Deathmatch <br>

        <br>

        <!-- Textarea for long answer -->
        <label>Why do you want to join?</label><br>
        <textarea rows="5" cols="40"></textarea>

        <br><br>

        <!-- Submit button -->
        <input type="submit" value="Register">

    </form>

    <br>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Valorant Gaming Hub</p>
    </footer>

</body>
</html>
